<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Cloud ☁️ | Sweet Treats at Affordable Prices</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ============================================
           CSS VARIABLES & RESET
           ============================================ */
        :root {
            <head>
    <meta charset="UTF-8">
    ...
    <link rel="stylesheet" href="...font-awesome...">
    <base target="_blank">  <!-- 
        :root {             
            --primary-pink: #ff8fab;
            ...
            --soft-pink: #ffc2d1;
            --light-pink: #ffe5ec;
            --pastel-purple: #cdb4db;
            --light-purple: #e0c3fc;
            --soft-white: #fff0f5;
            --cream: #fff8fb;
            --dark-text: #2d2d2d;
            --medium-text: #555555;
            --light-text: #888888;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --shadow-soft: 0 8px 32px rgba(255, 143, 171, 0.15);
            --shadow-hover: 0 20px 60px rgba(255, 143, 171, 0.25);
            --gradient-hero: linear-gradient(135deg, rgba(255, 197, 209, 0.3) 0%, rgba(205, 180, 219, 0.3) 100%);
            --gradient-card: linear-gradient(145deg, #ffffff 0%, #fff5f8 100%);
            --gradient-btn: linear-gradient(135deg, #ff8fab 0%, #cdb4db 100%);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cream);
            color: var(--dark-text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 143, 171, 0.4); }
            50% { box-shadow: 0 0 40px rgba(255, 143, 171, 0.7); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
            transition: var(--transition);
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            padding: 0.6rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .navbar.scrolled .logo {
            color: var(--primary-pink);
            text-shadow: none;
        }

        .logo i {
            font-size: 1.3rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
            padding: 0.3rem 0;
            transition: var(--transition);
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }

        .navbar.scrolled .nav-links a {
            color: var(--dark-text);
            text-shadow: none;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-btn);
            transition: var(--transition);
            border-radius: 2px;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--primary-pink);
        }

        .navbar.scrolled .nav-links a:hover {
            color: var(--primary-pink);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
        }

        .navbar.scrolled .mobile-menu-btn {
            color: var(--dark-text);
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1582053433976-25c00369fc93?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(45, 20, 30, 0.75) 0%, rgba(80, 40, 60, 0.65) 50%, rgba(45, 20, 30, 0.75) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            color: #fff;
            margin-bottom: 1rem;
            line-height: 1.1;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .hero-title .cloud-emoji {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .hero-btn {
            display: inline-block;
            padding: 1rem 3rem;
            background: var(--gradient-btn);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            animation: pulse-glow 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .hero-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .hero-btn:hover::before {
            left: 100%;
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 143, 171, 0.5);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: float 2s ease-in-out infinite;
        }

        .scroll-indicator i {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.5rem;
        }

        /* ============================================
           SECTION STYLES
           ============================================ */
        section {
            padding: 6rem 2rem;
            position: relative;
        }

        .section-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-label {
            display: inline-block;
            background: var(--light-pink);
            color: var(--primary-pink);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            color: var(--dark-text);
            margin-bottom: 1rem;
        }

        .section-subtitle {
            color: var(--medium-text);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ============================================
           MENU SECTION
           ============================================ */
        #menu {
            background: var(--cream);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--gradient-card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-hover);
        }

        .product-image-wrapper {
            position: relative;
            height: 280px;
            overflow: hidden;
            background: linear-gradient(135deg, #fff 0%, #f8f0f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .product-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .product-card:hover .product-image-wrapper img {
            transform: scale(1.12);
        }

        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gradient-btn);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.3);
        }

        .product-info {
            padding: 1.8rem 2rem 2rem;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 0.5rem;
        }

        .product-desc {
            color: var(--light-text);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-pink);
        }

        .product-price span {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--light-text);
        }

        .add-to-cart {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-btn);
            border: none;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.3);
        }

        .add-to-cart:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 20px rgba(255, 143, 171, 0.5);
        }

        /* ============================================
           ABOUT SECTION
           ============================================ */
        #about {
            background: linear-gradient(135deg, #fff0f5 0%, #f5e6ff 100%);
            position: relative;
            overflow: hidden;
        }

        #about::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 143, 171, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image img {
            width: 100%;
            border-radius: 24px;
            box-shadow: var(--shadow-hover);
            transition: var(--transition);
        }

        .about-image:hover img {
            transform: scale(1.02);
        }

        .about-image::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 100%;
            height: 100%;
            border: 3px solid var(--primary-pink);
            border-radius: 24px;
            z-index: -1;
            opacity: 0.3;
        }

        .about-text h3 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark-text);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .about-text p {
            color: var(--medium-text);
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .stat-item {
            text-align: center;
            padding: 1.2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: var(--transition);
        }

        .stat-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-soft);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-pink);
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--light-text);
            font-weight: 500;
        }

        /* ============================================
           REVIEWS SECTION
           ============================================ */
        #reviews {
            background: var(--cream);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background: var(--gradient-card);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .review-card::before {
            content: '"';
            position: absolute;
            top: 1rem;
            right: 2rem;
            font-size: 5rem;
            color: var(--light-pink);
            font-family: Georgia, serif;
            line-height: 1;
            opacity: 0.6;
        }

        .review-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .review-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--gradient-btn);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .review-meta h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-text);
        }

        .review-stars {
            color: #ffc107;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .review-text {
            color: var(--medium-text);
            font-size: 0.95rem;
            line-height: 1.7;
            font-style: italic;
        }

        /* ============================================
           ORDER SECTION
           ============================================ */
        #order {
            background: linear-gradient(135deg, #ffe5ec 0%, #e0c3fc 100%);
            position: relative;
            overflow: hidden;
        }

        #order::before {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(205, 180, 219, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .order-container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .order-form {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-soft);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid rgba(255, 143, 171, 0.2);
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            color: var(--dark-text);
            transition: var(--transition);
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 0 4px rgba(255, 143, 171, 0.15);
            background: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--gradient-btn);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 25px rgba(255, 143, 171, 0.35);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 143, 171, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ============================================
           CONTACT SECTION
           ============================================ */
        #contact {
            background: var(--cream);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .contact-card {
            background: var(--gradient-card);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .contact-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .contact-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--gradient-btn);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            color: #fff;
            font-size: 1.8rem;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(255, 143, 171, 0.3);
        }

        .contact-card:hover .contact-icon {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 12px 30px rgba(255, 143, 171, 0.4);
        }

        .contact-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 0.5rem;
        }

        .contact-card p {
            color: var(--light-text);
            font-size: 0.9rem;
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            color: #fff;
            padding: 3rem 2rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .footer-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2rem 0 1.5rem;
        }

        .footer-bottom {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .footer-bottom a {
            color: var(--soft-pink);
            text-decoration: none;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                max-width: 300px;
                height: 100vh;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 5rem 2rem 2rem;
                gap: 1.5rem;
                transition: right 0.4s ease;
                box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                color: var(--dark-text) !important;
                text-shadow: none !important;
                font-size: 1.1rem;
            }

            .mobile-menu-btn {
