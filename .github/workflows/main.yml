    <!-- ============================================
         JAVASCRIPT
         ============================================ -->
    <script>
        // ============================================
        // NAVBAR SCROLL EFFECT
        // ============================================
        const navbar = document.getElementById('navbar');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 80) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // ============================================
        // MOBILE MENU TOGGLE
        // ============================================
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = mobileMenuBtn.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });

        // Close mobile menu when clicking a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                const icon = mobileMenuBtn.querySelector('i');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            });
        });

        // ============================================
        // SCROLL ANIMATIONS (Fade In)
        // ============================================
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.animate-on-scroll').forEach(el => {
            observer.observe(el);
        });

        // ============================================
        // ORDER FORM — SEND TO WHATSAPP
        // ============================================
        const orderForm = document.getElementById('orderForm');

        orderForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const product = document.getElementById('product').value;
            const quantity = document.getElementById('quantity').value;
            const message = document.getElementById('message').value.trim();

            if (!name || !phone || !product || !quantity) {
                alert('Please fill in all required fields.');
                return;
            }

            // Build WhatsApp message
            let waMessage = `*New Order from Candy Cloud* %0A%0A`;
            waMessage += `*Name:* ${name}%0A`;
            waMessage += `*Phone:* ${phone}%0A`;
            waMessage += `*Product:* ${product}%0A`;
            waMessage += `*Quantity:* ${quantity}%0A`;
            if (message) {
                waMessage += `*Message:* ${message}%0A`;
            }
            waMessage += `%0AThank you! 🍬`;

            // Use first WhatsApp number as default
            const waNumber = '601126096530';
            const waUrl = `https://wa.me/${waNumber}?text=${waMessage}`;

            // Show confirmation
            alert('Order sent! We will contact you on WhatsApp shortly.');

            // Open WhatsApp
            window.open(waUrl, '_blank');

            // Reset form
            orderForm.reset();
        });

        // ============================================
        // ADD TO CART BUTTONS (Scroll to order)
        // ============================================
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', function() {
                const card = this.closest('.product-card');
                const productName = card.querySelector('.product-name').textContent;
                document.getElementById('product').value = productName;
                document.getElementById('order').scrollIntoView({ behavior: 'smooth' });
            });
        });

        // ============================================
        // SMOOTH SCROLL FOR ANCHOR LINKS
        // ============================================
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    const offset = 70;
                    const targetPosition = target.getBoundingClientRect().top + window.pageYOffset - offset;
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>

</body>
